<style>

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;

const storage={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?{value:v}:null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,v);return true}catch{return false}},
  delete:(k)=>{try{localStorage.removeItem(k);return true}catch{return false}},
};

    {id:4,name:"Ngozi Eze",phone:"+234 901 777 8888",email:"",products:"Jollof Rice, Shawarma",lastPurchase:"2026-03-26",totalSpent:9500,notes:"Daily food customer"},
    {id:5,name:"Blessing Adeyemi",phone:"+234 812 999 0000",email:"blessing@hotmail.com",products:"Perfume Oil, Body Cream",lastPurchase:"2026-03-25",totalSpent:33000,notes:"Referral source"},

// ── UTILS ────────────────────────────────────────────────────────
const N=(n)=>`₦${Number(n||0).toLocaleString("en-NG")}`;
const today=()=>new Date().toISOString().split("T")[0];
const uid=(arr)=>arr.length===0?1:Math.max(...arr.map(x=>x.id))+1;
const rev=(s)=>s.qty*s.sellPrice;
const prof=(s)=>(s.sellPrice-s.costPrice)*s.qty;

// ── COLORS ────────────────────────────────────────────────────────
const C={bg:"#05101a",sidebar:"#060d18",card:"#0b1929",border:"rgba(255,255,255,0.07)",teal:"#0ea49e",gold:"#f4b942",goldDim:"#c9922a",text:"#dce8f4",muted:"#5e80a0",green:"#20c997",red:"#f16f6f"};
const inp={background:"rgba(255,255,255,0.04)",border:`1px solid ${C.border}`,borderRadius:9,padding:"10px 14px",color:C.text,width:"100%",fontSize:14,fontFamily:"DM Sans,sans-serif",boxSizing:"border-box"};
const btnGold={background:`linear-gradient(135deg,${C.gold},${C.teal})`,border:"none",borderRadius:10,padding:"11px 26px",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"DM Sans,sans-serif",letterSpacing:"0.03em",whiteSpace:"nowrap"};
const btnGhost={background:"transparent",border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 20px",color:C.muted,fontWeight:500,fontSize:14,cursor:"pointer",fontFamily:"DM Sans,sans-serif"};

// ── SUBSCRIPTION GATE ────────────────────────────────────────────

    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"DM Sans,sans-serif",position:"relative",overflowX:"hidden"}}>
      <div style={{position:"fixed",top:"-15%",left:"-8%",width:600,height:600,borderRadius:"50%",background:"radial-gradient(circle,rgba(14,164,158,0.11),transparent 70%)",pointerEvents:"none"}}/>
      <div style={{position:"fixed",bottom:"-20%",right:"-10%",width:750,height:750,borderRadius:"50%",background:"radial-gradient(circle,rgba(244,185,66,0.07),transparent 70%)",pointerEvents:"none"}}/>
      {/* Top bar */}
      <div style={{padding:"18px 40px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:9,background:`linear-gradient(135deg,${C.gold},${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>🏪</div>
          <span style={{fontFamily:"Playfair Display,serif",color:C.text,fontWeight:700,fontSize:17}}>SmartTracker Pro</span>
        </div>
        <span style={{color:C.muted,fontSize:12}}>Built for Nigerian Small Business Owners · ₦ Native</span>
      </div>
      {/* Hero */}
      <div style={{maxWidth:1100,margin:"0 auto",padding:"60px 40px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:80,alignItems:"center"}}>
        <div style={{animation:"fadeUp 0.6s ease both"}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,background:"rgba(14,164,158,0.08)",border:"1px solid rgba(14,164,158,0.18)",borderRadius:100,padding:"5px 14px",marginBottom:22}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:C.teal,display:"inline-block",animation:"pulse 1.5s ease infinite"}}/>
            <span style={{color:C.teal,fontSize:12,fontWeight:600}}>Market Vendors · Boutiques · Food · Online Sellers</span>
          </div>
          <h1 style={{fontFamily:"Playfair Display,serif",fontSize:50,fontWeight:900,margin:"0 0 14px",lineHeight:1.1}}>
            <span style={{color:C.text}}>Smart </span>
            <span style={{background:`linear-gradient(135deg,${C.gold},${C.goldDim})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Business</span>
            <br/><span style={{color:C.text}}>Tracker </span><span style={{color:C.teal}}>Pro</span>
          </h1>
          <p style={{color:C.muted,fontSize:16,lineHeight:1.8,maxWidth:420,margin:"0 0 36px"}}>The all-in-one business management platform. Track sales, inventory, expenses and customers — all auto-calculated in real time.</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {features.map(f=>(
              <div key={f.label} className="feat-chip" style={{display:"flex",alignItems:"center",gap:11,padding:"11px 13px",borderRadius:10,border:`1px solid ${C.border}`,background:"rgba(255,255,255,0.02)",transition:"background 0.15s"}}>
                <span style={{fontSize:20}}>{f.icon}</span>

              <span style={{color:"#fff",fontSize:10,fontWeight:800,letterSpacing:"0.06em"}}>✦ MOST POPULAR</span>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{fontFamily:"Playfair Display,serif",color:C.text,fontSize:20,fontWeight:700}}>Pro Plan</div>

    </div>

}

// ── SIDEBAR ──────────────────────────────────────────────────────
const NAV=[{id:"dashboard",icon:"📊",label:"Dashboard"},{id:"sales",icon:"🛒",label:"Sales"},{id:"inventory",icon:"📦",label:"Inventory"},{id:"expenses",icon:"💸",label:"Expenses"},{id:"customers",icon:"👥",label:"Customers"}];
function Sidebar({active,setActive,open,setOpen,bname,onLogout}){
  return(
    <div style={{width:open?220:62,minHeight:"100vh",background:C.sidebar,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",transition:"width 0.22s",flexShrink:0,zIndex:10}}>
      <div style={{padding:open?"18px 18px 14px":"18px 12px 14px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:10,overflow:"hidden"}}>
          <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${C.gold},${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🏪</div>
          {open&&<span style={{fontFamily:"Playfair Display,serif",color:C.text,fontWeight:700,fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{bname}</span>}
        </div>
      </div>
      <nav style={{flex:1,padding:"14px 8px"}}>
        {NAV.map(n=>{
          const isActive=active===n.id;
          return(
            <button key={n.id} className="nav-btn" onClick={()=>setActive(n.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"11px 10px",borderRadius:10,border:"none",cursor:"pointer",background:isActive?"rgba(14,164,158,0.12)":"transparent",color:isActive?C.teal:C.muted,borderLeft:isActive?`3px solid ${C.teal}`:"3px solid transparent",marginBottom:3,transition:"all 0.14s",fontFamily:"DM Sans,sans-serif",fontWeight:isActive?600:400,fontSize:14,overflow:"hidden",textAlign:"left"}}>
              <span style={{fontSize:18,flexShrink:0}}>{n.icon}</span>
              {open&&<span style={{whiteSpace:"nowrap"}}>{n.label}</span>}
            </button>
          );
        })}
      </nav>
      <div style={{padding:"12px 8px",borderTop:`1px solid ${C.border}`}}>
        <button className="nav-btn" onClick={()=>setOpen(!open)} style={{width:"100%",display:"flex",alignItems:"center",gap:8,justifyContent:open?"flex-start":"center",padding:"10px 10px",borderRadius:10,border:"none",background:"rgba(255,255,255,0.02)",cursor:"pointer",color:C.muted,fontFamily:"DM Sans,sans-serif",fontSize:13,marginBottom:6}}>
          <span style={{fontSize:15}}>{open?"◀":"▶"}</span>
          {open&&<span style={{fontSize:12}}>Collapse</span>}
        </button>
        {open&&(
          <button className="nav-btn" onClick={onLogout} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"10px 10px",borderRadius:10,border:"none",background:"rgba(241,111,111,0.05)",cursor:"pointer",color:C.red,fontFamily:"DM Sans,sans-serif",fontSize:13}}>
            <span>🚪</span><span>Sign Out</span>
          </button>
        )}
      </div>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────
function Dashboard({sales,inventory,expenses}){
  const td=today();
  const todaySales=sales.filter(s=>s.date===td).reduce((a,s)=>a+rev(s),0);
  const ws=new Date();ws.setDate(ws.getDate()-ws.getDay());
  const weekStr=ws.toISOString().split("T")[0];
  const weekSales=sales.filter(s=>s.date>=weekStr).reduce((a,s)=>a+rev(s),0);
  const mo=td.slice(0,7);
  const monthSales=sales.filter(s=>s.date.startsWith(mo)).reduce((a,s)=>a+rev(s),0);
  const grossProfit=sales.reduce((a,s)=>a+prof(s),0);
  const totalExp=expenses.reduce((a,e)=>a+e.amount,0);
  const netProfit=grossProfit-totalExp;
  const lowStock=inventory.filter(i=>i.stock<=i.restockLevel);
  const KPI=({icon,label,value,color,sub})=>(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:22,position:"relative",overflow:"hidden",animation:"fadeUp 0.5s ease both"}}>
      <div style={{position:"absolute",top:-8,right:-8,fontSize:56,opacity:0.04}}>{icon}</div>
      <div style={{color:C.muted,fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:7}}>{label}</div>
      <div style={{fontFamily:"Playfair Display,serif",fontSize:28,fontWeight:700,color:color||C.text,marginBottom:3}}>{N(value)}</div>
      {sub&&<div style={{color:C.muted,fontSize:11}}>{sub}</div>}
    </div>
  );
  return(
    <div>
      <h2 style={{fontFamily:"Playfair Display,serif",color:C.text,fontSize:26,fontWeight:700,margin:"0 0 22px"}}>Business Dashboard <span style={{color:C.teal,fontSize:16,fontWeight:400}}>— Live Overview</span></h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:24}}>
        <KPI icon="💰" label="Today's Sales" value={todaySales} color={C.teal} sub="Auto-calculated"/>
        <KPI icon="📅" label="This Week" value={weekSales} color={C.gold}/>
        <KPI icon="🗓" label="This Month" value={monthSales}/>
        <KPI icon="💹" label="Gross Profit" value={grossProfit} color={C.green}/>
        <KPI icon="💸" label="Total Expenses" value={totalExp} color={C.red}/>
        <KPI icon="🏆" label="Net Profit" value={netProfit} color={netProfit>=0?C.green:C.red} sub="Profit minus expenses"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:14}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20}}>
          <h3 style={{fontFamily:"Playfair Display,serif",color:C.text,fontSize:17,margin:"0 0 16px"}}>Recent Sales</h3>
          {sales.slice(0,6).map((s,i)=>(
            <div key={s.id} className="row-hover" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 6px",borderBottom:i<5?`1px solid ${C.border}`:"none",transition:"background 0.14s"}}>
              <div>
                <div style={{color:C.text,fontSize:13,fontWeight:500}}>{s.product}</div>
                <div style={{color:C.muted,fontSize:11,marginTop:2}}>{s.date} · qty {s.qty} · <span style={{color:C.teal}}>{s.category}</span></div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{color:C.teal,fontWeight:700,fontSize:13}}>{N(rev(s))}</div>
                <div style={{color:C.green,fontSize:11}}>+{N(prof(s))}</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20}}>
          <h3 style={{fontFamily:"Playfair Display,serif",color:C.text,fontSize:17,margin:"0 0 16px"}}>🚨 Restock Alerts <span style={{color:C.red,fontSize:14,fontWeight:500}}>({lowStock.length})</span></h3>
          {lowStock.length===0
            ?<div style={{color:C.green,fontSize:13,padding:"12px 0"}}>✅ All stock levels are OK</div>
            :lowStock.map(i=>(
              <div key={i.id} className="row-hover" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 6px",borderBottom:`1px solid ${C.border}`,transition:"background 0.14s"}}>
                <div>
                  <div style={{color:C.text,fontSize:13,fontWeight:500}}>{i.product}</div>
                  <div style={{color:C.red,fontSize:11,marginTop:2}}>Stock: {i.stock} / Min: {i.restockLevel}</div>
                </div>
                <span style={{background:"rgba(241,111,111,0.1)",color:C.red,fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:100,border:"1px solid rgba(241,111,111,0.15)"}}>RESTOCK</span>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

// ── SHARED TABLE ──────────────────────────────────────────────────
function Table({heads,rows}){
  return(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"DM Sans,sans-serif",minWidth:600}}>
        <thead>
          <tr style={{borderBottom:`1px solid ${C.border}`}}>
            {heads.map(h=><th key={h} style={{padding:"13px 16px",textAlign:"left",color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.09em",whiteSpace:"nowrap"}}>{h}</th>)}
          </tr>
        </thead>
        <tbody>{rows}</tbody>
      </table>
    </div>
  );
}
const TD=({children,color,bold})=><td style={{padding:"13px 16px",color:color||C.text,fontSize:13,fontWeight:bold?600:400,whiteSpace:"nowrap"}}>{children}</td>;
const Chip=({label,color="teal"})=>{
  const m={teal:[C.teal,"rgba(14,164,158,0.1)","rgba(14,164,158,0.18)"],gold:[C.gold,"rgba(244,185,66,0.1)","rgba(244,185,66,0.15)"],red:[C.red,"rgba(241,111,111,0.1)","rgba(241,111,111,0.15)"],green:[C.green,"rgba(32,201,151,0.1)","rgba(32,201,151,0.15)"]};
  const[fg,bg,border]=m[color]||m.teal;
  return<span style={{background:bg,color:fg,border:`1px solid ${border}`,fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:100,whiteSpace:"nowrap"}}>{label}</span>;
};
const DelBtn=({onClick})=><td style={{padding:"13px 16px"}}><button className="icon-btn" onClick={onClick} style={{background:"transparent",border:"none",cursor:"pointer",color:C.red,fontSize:16,padding:0,transition:"opacity 0.15s"}}>🗑</button></td>;
const StatBar=({items})=>(
  <div style={{display:"grid",gridTemplateColumns:`repeat(${items.length},1fr)`,gap:14,marginBottom:20}}>
    {items.map(([v,l,c])=>(
      <div key={l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 18px"}}>
        <div style={{color:C.muted,fontSize:11,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5}}>{l}</div>
        <div style={{fontFamily:"Playfair Display,serif",color:c,fontSize:24,fontWeight:700}}>{v}</div>
      </div>
    ))}
  </div>
);

// ── SALES ─────────────────────────────────────────────────────────
function SalesTab({sales,saveSales,setModal}){
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontFamily:"Playfair Display,serif",color:C.text,fontSize:26,fontWeight:700,margin:0}}>Sales Tracker</h2>
        <button onClick={()=>setModal({type:"sale"})} style={btnGold}>+ Add Sale</button>
      </div>
      <StatBar items={[[N(sales.reduce((a,s)=>a+rev(s),0)),"Total Revenue",C.teal],[N(sales.reduce((a,s)=>a+prof(s),0)),"Gross Profit",C.green],[`${sales.length} entries`,"Records",C.gold]]}/>
      <Table heads={["Date","Product / Service","Qty","Category","Cost Price","Sell Price","Revenue","Profit",""]}
        rows={sales.map(s=>(
          <tr key={s.id} className="row-hover" style={{borderBottom:`1px solid ${C.border}`,transition:"background 0.14s"}}>
            <TD color={C.muted}>{s.date}</TD><TD bold>{s.product}</TD><TD>{s.qty}</TD>
            <td style={{padding:"13px 16px"}}><Chip label={s.category}/></td>
            <TD color={C.muted}>{N(s.costPrice)}</TD><TD>{N(s.sellPrice)}</TD>
            <TD color={C.teal} bold>{N(rev(s))}</TD><TD color={C.green} bold>{N(prof(s))}</TD>
            <DelBtn onClick={()=>saveSales(sales.filter(x=>x.id!==s.id))}/>
          </tr>
        ))}
      />
    </div>
  );
}

// ── INVENTORY ─────────────────────────────────────────────────────
function InventoryTab({inventory,saveInventory,setModal}){
  const alerts=inventory.filter(i=>i.stock<=i.restockLevel).length;
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontFamily:"Playfair Display,serif",color:C.text,fontSize:26,fontWeight:700,margin:0}}>Inventory Manager</h2>
        <button onClick={()=>setModal({type:"inventory"})} style={btnGold}>+ Add Item</button>
      </div>
      <StatBar items={[[N(inventory.reduce((a,i)=>a+i.costPrice*i.stock,0)),"Total Stock Value",C.gold],[`${inventory.length} items`,"Products Tracked",C.teal],[`${alerts} item${alerts!==1?"s":""}`,alerts>0?"Need Restocking":"All Stock OK",alerts>0?C.red:C.green]]}/>
      <Table heads={["Product","Category","Cost Price","Sell Price","Stock Qty","Restock Level","Stock Value","Status",""]}
        rows={inventory.map(i=>{
          const bad=i.stock<=i.restockLevel;
          return(
            <tr key={i.id} className="row-hover" style={{borderBottom:`1px solid ${C.border}`,transition:"background 0.14s"}}>
              <TD bold>{i.product}</TD><TD color={C.muted}>{i.category}</TD>
              <TD color={C.muted}>{N(i.costPrice)}</TD><TD>{N(i.sellPrice)}</TD>
              <TD color={bad?C.red:C.text} bold>{i.stock}</TD><TD color={C.muted}>{i.restockLevel}</TD>
              <TD color={C.gold} bold>{N(i.costPrice*i.stock)}</TD>
              <td style={{padding:"13px 16px"}}>{bad?<Chip label="🔴 RESTOCK" color="red"/>:<Chip label="✅ OK" color="green"/>}</td>
              <DelBtn onClick={()=>saveInventory(inventory.filter(x=>x.id!==i.id))}/>
            </tr>
          );
        })}
      />
    </div>
  );
}

// ── EXPENSES ──────────────────────────────────────────────────────
function ExpensesTab({expenses,saveExpenses,setModal}){
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontFamily:"Playfair Display,serif",color:C.text,fontSize:26,fontWeight:700,margin:0}}>Expenses Tracker</h2>
        <button onClick={()=>setModal({type:"expense"})} style={btnGold}>+ Add Expense</button>
      </div>
      <StatBar items={[[N(expenses.reduce((a,e)=>a+e.amount,0)),"Total Expenses",C.red],[`${[...new Set(expenses.map(e=>e.category))].length}`,`Categories`,C.gold],[`${expenses.length} entries`,"Records",C.teal]]}/>
      <Table heads={["Date","Description","Category","Amount","Notes",""]}
        rows={expenses.map(e=>(
          <tr key={e.id} className="row-hover" style={{borderBottom:`1px solid ${C.border}`,transition:"background 0.14s"}}>
            <TD color={C.muted}>{e.date}</TD><TD bold>{e.description}</TD>
            <td style={{padding:"13px 16px"}}><Chip label={e.category} color="gold"/></td>
            <TD color={C.red} bold>{N(e.amount)}</TD><TD color={C.muted}>{e.notes}</TD>
            <DelBtn onClick={()=>saveExpenses(expenses.filter(x=>x.id!==e.id))}/>
          </tr>
        ))}
      />
    </div>
  );
}

// ── CUSTOMERS ─────────────────────────────────────────────────────
function CustomersTab({customers,saveCustomers,setModal}){
  const totalVal=customers.reduce((a,c)=>a+c.totalSpent,0);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontFamily:"Playfair Display,serif",color:C.text,fontSize:26,fontWeight:700,margin:0}}>Customer Tracker</h2>
        <button onClick={()=>setModal({type:"customer"})} style={btnGold}>+ Add Customer</button>
      </div>
      <StatBar items={[[`${customers.length}`,"Total Customers",C.teal],[N(totalVal),"Cumulative Value",C.gold],[N(customers.length?Math.round(totalVal/customers.length):0),"Avg Spend / Customer",C.green]]}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
        {customers.map(c=>(
          <div key={c.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20,position:"relative",animation:"fadeUp 0.4s ease both"}}>
            <button className="icon-btn" onClick={()=>saveCustomers(customers.filter(x=>x.id!==c.id))} style={{position:"absolute",top:14,right:14,background:"transparent",border:"none",cursor:"pointer",color:C.red,fontSize:16,transition:"opacity 0.15s"}}>🗑</button>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
              <div style={{width:42,height:42,borderRadius:"50%",background:`linear-gradient(135deg,${C.teal},${C.gold})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontFamily:"Playfair Display,serif",fontWeight:700,fontSize:17,flexShrink:0}}>{c.name[0]}</div>
              <div>
                <div style={{color:C.text,fontWeight:600,fontSize:14}}>{c.name}</div>
                <div style={{color:C.muted,fontSize:12}}>{c.phone}</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <div style={{background:"rgba(255,255,255,0.025)",borderRadius:8,padding:"8px 10px"}}>
                <div style={{color:C.muted,fontSize:10,textTransform:"uppercase"}}>Total Spent</div>
                <div style={{color:C.gold,fontWeight:700,fontSize:15,marginTop:2}}>{N(c.totalSpent)}</div>
              </div>
              <div style={{background:"rgba(255,255,255,0.025)",borderRadius:8,padding:"8px 10px"}}>
                <div style={{color:C.muted,fontSize:10,textTransform:"uppercase"}}>Last Purchase</div>
                <div style={{color:C.text,fontSize:12,marginTop:2}}>{c.lastPurchase}</div>
              </div>
            </div>
            {c.products&&<div style={{color:C.muted,fontSize:12,marginBottom:6}}>📦 {c.products}</div>}
            {c.notes&&<div style={{color:C.teal,fontSize:12,fontStyle:"italic"}}>{c.notes}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── MODAL ────────────────────────────────────────────────────────
function FormModal({modal,setModal,sales,saveSales,inventory,saveInventory,expenses,saveExpenses,customers,saveCustomers}){
  const[form,setForm]=useState({});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const close=()=>setModal(null);
  const handleSave=()=>{
    const t=modal.type;
    if(t==="sale"){
      if(!form.product?.trim()||!form.qty||!form.sellPrice)return;
      saveSales([{id:uid(sales),date:form.date||today(),product:form.product.trim(),qty:Number(form.qty),category:form.category||"General",costPrice:Number(form.costPrice||0),sellPrice:Number(form.sellPrice)},...sales]);
    }else if(t==="inventory"){
      if(!form.product?.trim())return;
      saveInventory([{id:uid(inventory),product:form.product.trim(),category:form.category||"General",costPrice:Number(form.costPrice||0),sellPrice:Number(form.sellPrice||0),stock:Number(form.stock||0),restockLevel:Number(form.restockLevel||5)},...inventory]);
    }else if(t==="expense"){
      if(!form.description?.trim()||!form.amount)return;
      saveExpenses([{id:uid(expenses),date:form.date||today(),description:form.description.trim(),category:form.category||"General",amount:Number(form.amount),notes:form.notes||""},...expenses]);
    }else if(t==="customer"){
      if(!form.name?.trim())return;
      saveCustomers([{id:uid(customers),name:form.name.trim(),phone:form.phone||"",email:form.email||"",products:form.products||"",lastPurchase:form.lastPurchase||today(),totalSpent:Number(form.totalSpent||0),notes:form.notes||""},...customers]);
    }
    close();
  };
  const titles={sale:"Add New Sale",inventory:"Add Inventory Item",expense:"Add Expense",customer:"Add Customer"};
  const F=({label,k,type="text",placeholder=""})=>(
    <div>
      <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.07em"}}>{label}</label>
      <input type={type} value={form[k]||""} onChange={e=>set(k,e.target.value)} placeholder={placeholder} style={inp}/>
    </div>
  );
  const R=({children})=><div style={{display:"grid",gridTemplateColumns:`repeat(${React.Children.count(children)},1fr)`,gap:12}}>{children}</div>;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.72)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div style={{background:"#0b1c2e",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:30,width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto",fontFamily:"DM Sans,sans-serif",animation:"fadeUp 0.25s ease both"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <h3 style={{fontFamily:"Playfair Display,serif",color:C.text,fontSize:20,fontWeight:700,margin:0}}>{titles[modal.type]}</h3>
          <button onClick={close} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:20,lineHeight:1}}>✕</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {modal.type==="sale"&&<>
            <R><F label="Date" k="date" type="date"/></R>
            <F label="Product / Service Name" k="product" placeholder="e.g. Plain T-Shirt (XL)"/>
            <R>
              <F label="Quantity" k="qty" type="number" placeholder="1"/>
              <div>
                <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.07em"}}>Category</label>
                <select value={form.category||""} onChange={e=>set("category",e.target.value)} style={{...inp,cursor:"pointer"}}>
                  <option value="">Select…</option>
                  {["Boutique","Food","Online","Importer","Side Hustle","General"].map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
            </R>
            <R><F label="Cost Price (₦)" k="costPrice" type="number" placeholder="0"/><F label="Selling Price (₦)" k="sellPrice" type="number" placeholder="0"/></R>
          </>}
          {modal.type==="inventory"&&<>
            <F label="Product Name" k="product" placeholder="e.g. Ankara Fabric (6 yds)"/>
            <F label="Category" k="category" placeholder="Clothing, Food, Accessories…"/>
            <R><F label="Cost Price (₦)" k="costPrice" type="number"/><F label="Selling Price (₦)" k="sellPrice" type="number"/></R>
            <R><F label="Current Stock Qty" k="stock" type="number"/><F label="Restock Alert Level" k="restockLevel" type="number"/></R>
          </>}
          {modal.type==="expense"&&<>
            <R><F label="Date" k="date" type="date"/></R>
            <F label="Description" k="description" placeholder="e.g. Transport to market"/>
            <div>
              <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.07em"}}>Category</label>
              <select value={form.category||""} onChange={e=>set("category",e.target.value)} style={{...inp,cursor:"pointer"}}>
                <option value="">Select…</option>
                {["Transport","Marketing","Packaging","Utilities","Communication","Staff","Equipment","Cost of Goods","Logistics","Platform Fee","Other"].map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <F label="Amount (₦)" k="amount" type="number" placeholder="0"/>
            <F label="Notes (optional)" k="notes" placeholder="Any extra details…"/>
          </>}
          {modal.type==="customer"&&<>
            <F label="Customer Name" k="name" placeholder="e.g. Adunola Fashola"/>
            <R><F label="Phone Number" k="phone" placeholder="+234 800 000 0000"/><F label="Email (optional)" k="email" placeholder="email@example.com"/></R>
            <F label="Products Bought" k="products" placeholder="e.g. Ankara, T-Shirts"/>
            <R><F label="Total Spent (₦)" k="totalSpent" type="number" placeholder="0"/><F label="Last Purchase Date" k="lastPurchase" type="date"/></R>
            <F label="Notes / VIP Tag" k="notes" placeholder="e.g. ⭐ VIP — buys monthly"/>
          </>}
        </div>
        <div style={{display:"flex",gap:10,marginTop:26}}>
          <button onClick={handleSave} style={{...btnGold,flex:1,textAlign:"center",padding:13}}>Save Record</button>
          <button onClick={close} style={{...btnGhost,flex:1,textAlign:"center"}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────
function App(){
  const[ready,setReady]=useState(false);
  const[subscribed,setSubscribed]=useState(false);
  const[trialEnd,setTrialEnd]=useState(null);
  const[tab,setTab]=useState("dashboard");
  const[sidebar,setSidebar]=useState(true);
  const[bname,setBname]=useState("My Business");
  const[sales,setSales]=useState(SEED.sales);
  const[inventory,setInventory]=useState(SEED.inventory);
  const[expenses,setExpenses]=useState(SEED.expenses);
  const[customers,setCustomers]=useState(SEED.customers);
  const[modal,setModal]=useState(null);

  useEffect(()=>{
    try{
      const sub=storage.get("sbt-sub");
      if(sub?.value){const p=JSON.parse(sub.value);if(p.active){setSubscribed(true);setTrialEnd(p.trialEnd||null);setBname(p.bname||"My Business");}}
      const ss=storage.get("sbt-sales");if(ss?.value)setSales(JSON.parse(ss.value));
      const si=storage.get("sbt-inv");if(si?.value)setInventory(JSON.parse(si.value));
      const se=storage.get("sbt-exp");if(se?.value)setExpenses(JSON.parse(se.value));
      const sc=storage.get("sbt-cust");if(sc?.value)setCustomers(JSON.parse(sc.value));
    }catch{}
    setReady(true);
  },[]);

  const save=(key,setter)=>data=>{setter(data);try{storage.set(key,JSON.stringify(data));}catch{}};
  const activate=(plan,name)=>{
    const end=new Date();end.setDate(end.getDate()+7);
    const biz=name||"My Business";
    setBname(biz);setTrialEnd(end.toISOString());setSubscribed(true);
    try{storage.set("sbt-sub",JSON.stringify({active:true,plan,trialEnd:end.toISOString(),bname:biz}));}catch{}
  };
  const logout=()=>{try{storage.delete("sbt-sub");}catch{}setSubscribed(false);};
  const daysLeft=trialEnd?Math.max(0,Math.ceil((new Date(trialEnd)-Date.now())/864e5)):null;

  if(!ready)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,gap:18,fontFamily:"DM Sans,sans-serif"}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:44,height:44,borderRadius:12,background:`linear-gradient(135deg,${C.gold},${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🏪</div>
        <span style={{fontFamily:"Playfair Display,serif",color:C.text,fontSize:22,fontWeight:700}}>SmartTracker Pro</span>
      </div>
      <div style={{width:40,height:40,border:"3px solid rgba(255,255,255,0.08)",borderTop:`3px solid ${C.gold}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <p style={{color:C.muted,fontSize:13}}>Loading your business data…</p>
    </div>
  );

  if(!subscribed)return <SubscriptionGate onActivate={activate}/>;

  return(
    <div style={{display:"flex",minHeight:"100vh",background:C.bg}}>
      <Sidebar active={tab} setActive={setTab} open={sidebar} setOpen={setSidebar} bname={bname} onLogout={logout}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"14px 28px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(5,16,26,0.95)",position:"sticky",top:0,zIndex:5}}>
          <div>
            <div style={{fontFamily:"Playfair Display,serif",color:C.text,fontWeight:700,fontSize:18,lineHeight:1.2}}>{bname}</div>
            <div style={{color:C.muted,fontSize:11}}>Smart Business Tracker Pro</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {daysLeft!==null&&<div style={{background:"rgba(244,185,66,0.08)",border:"1px solid rgba(244,185,66,0.18)",borderRadius:100,padding:"5px 14px"}}><span style={{color:C.gold,fontSize:11,fontWeight:600}}>🕐 {daysLeft} day{daysLeft!==1?"s":""} left in trial</span></div>}
            <div style={{width:34,height:34,borderRadius:"50%",background:`linear-gradient(135deg,${C.teal},${C.gold})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontFamily:"Playfair Display,serif",fontWeight:700,fontSize:15}}>{bname[0]||"B"}</div>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"28px 32px"}}>
          {tab==="dashboard"&&<Dashboard sales={sales} inventory={inventory} expenses={expenses}/>}
          {tab==="sales"&&<SalesTab sales={sales} saveSales={save("sbt-sales",setSales)} setModal={setModal}/>}
          {tab==="inventory"&&<InventoryTab inventory={inventory} saveInventory={save("sbt-inv",setInventory)} setModal={setModal}/>}
          {tab==="expenses"&&<ExpensesTab expenses={expenses} saveExpenses={save("sbt-exp",setExpenses)} setModal={setModal}/>}
          {tab==="customers"&&<CustomersTab customers={customers} saveCustomers={save("sbt-cust",setCustomers)} setModal={setModal}/>}
        </div>
      </div>
      {modal&&<FormModal modal={modal} setModal={setModal} sales={sales} saveSales={save("sbt-sales",setSales)} inventory={inventory} saveInventory={save("sbt-inv",setInventory)} expenses={expenses} saveExpenses={save("sbt-exp",setExpenses)} customers={customers} saveCustomers={save("sbt-cust",setCustomers)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
